<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3b7d6e" />
  <title>智能用药问诊助手</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>智能用药问诊助手</h1>
    <p>像医生问诊一样，一步步帮你找到合适的家庭常备药</p>
  </header>

  <nav class="top-nav">
    <button class="nav-tab-top active" data-page="consult">智能问诊</button>
    <button class="nav-tab-top" data-page="encyclopedia">药物百科</button>
    <button class="nav-tab-top" data-page="checker">用药自查</button>
    <button class="nav-tab-top" data-page="records">我的记录</button>
  </nav>

  <main class="app-main">
    <div id="app" class="app-stage"><!-- 由 JS 渲染 --></div>
  </main>

  <div id="toast"></div>

  <footer class="app-footer">
    <span>MedGuide · 仅供 OTC 用药参考，不替代专业诊断</span>
  </footer>

  <!-- 数据层 -->
  <script src="./js/data/medicines.js"></script>
  <script src="./js/data/symptoms.js"></script>
  <script src="./js/data/diagnoses.js"></script>
  <script src="./js/data/interactions.js"></script>
  <!-- 引擎层 -->
  <script src="./js/engine/dialog.js"></script>
  <script src="./js/engine/safety.js"></script>
  <script src="./js/engine/recommend.js"></script>
  <script src="./js/engine/storage.js"></script>
  <!-- UI 层 -->
  <script src="./js/ui/components.js"></script>
  <script src="./js/ui/render.js"></script>
  <script src="./js/ui/encyclopedia.js"></script>
  <script src="./js/ui/checker.js"></script>
  <script src="./js/ui/records.js"></script>
  <!-- 入口 -->
  <script src="./js/app.js"></script>
</body>
</html>
